apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "athena-server.fullname" . }}
  labels:
    {{- include "athena-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "athena-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "athena-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.persistence.voices.enabled .Values.persistence.voices.initVoices }}
      initContainers:
        - name: init-voices
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              {{- range .Values.persistence.voices.initVoices }}
              if [ ! -f /voices/{{ .name }}.wav ]; then
                echo "Downloading {{ .name }}..."
                curl -fsSL -o /voices/{{ .name }}.wav "{{ .url }}"
              else
                echo "{{ .name }} already exists, skipping"
              fi
              {{- end }}
              echo "Voice init complete"
          volumeMounts:
            - name: voices
              mountPath: /voices
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5003
              protocol: TCP
          env:
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena-server.fullname" . }}-secrets
                  key: auth-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena-server.fullname" . }}-secrets
                  key: openai-api-key
            - name: AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "athena-server.fullname" . }}-secrets
                  key: agent-key
            - name: OPENAI_MODEL
              value: {{ .Values.openai.model | quote }}
            - name: OPENAI_TEMPERATURE
              value: {{ .Values.openai.temperature | quote }}
            - name: OPENAI_MAX_TOKENS
              value: {{ .Values.openai.maxTokens | quote }}
            - name: DEFAULT_VOICE
              value: {{ .Values.defaultVoice | quote }}
            - name: FORMATTING_PREPROMPT
              value: {{ .Values.prompts.formatting | quote }}
            - name: TTS_CONVERSION_PREPROMPT
              value: {{ .Values.prompts.ttsConversion | quote }}
            {{- if .Values.personalities }}
            - name: PERSONALITIES
              value: {{ .Values.personalities | toJson | quote }}
            {{- end }}
            - name: RATE_LIMIT_REQUESTS
              value: {{ .Values.security.rateLimitRequests | quote }}
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: {{ .Values.security.rateLimitWindowSeconds | quote }}
            - name: AUTH_FAIL_BAN_THRESHOLD
              value: {{ .Values.security.authFailBanThreshold | quote }}
            - name: AUTH_FAIL_BAN_DURATION_SECONDS
              value: {{ .Values.security.authFailBanDurationSeconds | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: AGENT_JOB_TTL_SECONDS
              value: {{ .Values.agent.jobTtlSeconds | quote }}
            - name: AGENT_MISSED_HEARTBEATS
              value: {{ .Values.agent.missedHeartbeats | quote }}
            - name: AGENT_RETENTION_DAYS
              value: {{ .Values.agent.retentionDays | quote }}
            {{- if .Values.persistence.voices.enabled }}
            - name: VOICES_DIR
              value: "/voices"
            {{- end }}
          {{- if .Values.persistence.voices.enabled }}
          volumeMounts:
            - name: voices
              mountPath: /voices
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.voices.enabled }}
      volumes:
        - name: voices
          persistentVolumeClaim:
            claimName: {{ include "athena-server.fullname" . }}-voices
      {{- end }}
