replicaCount: 1

image:
  repository: ebennerv/athena-server
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003

auth:
  token: ""

openai:
  apiKey: ""
  model: "gpt-4o"
  temperature: "0.7"
  maxTokens: "4096"

defaultVoice: ""

redis:
  enabled: true
  url: "redis://athena-redis:6379"

agent:
  key: ""
  jobTtlSeconds: 300
  missedHeartbeats: 3
  retentionDays: 30

prompts:
  formatting: "Format your response using markdown when appropriate. Use headers, bullet points, code blocks, and emphasis to make the response clear and readable."
  personality: "You are a helpful AI assistant."
  ttsConversion: "Convert this text to spoken form for a user who is speaking, not typing. Keep it as close to the original wording as possible. Only make minimal changes: remove markdown symbols, convert lists to sentences, spell out abbreviations. Do not rephrase, summarize, or add anything. Never say words like 'bullet', 'asterisk', or 'code block'. Output only the converted text."

security:
  rateLimitRequests: 300
  rateLimitWindowSeconds: 60
  authFailBanThreshold: 3
  authFailBanDurationSeconds: 604800

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

persistence:
  voices:
    enabled: false
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    # List of voices to download on startup
    # When persistence.voices.enabled is true, these are downloaded by init container
    initVoices:
      - name: freeman
        url: https://github.com/eb3095/athena-server/releases/download/voices/freeman.wav
    # Add more voices as needed:
    # - name: custom
    #   url: https://your-host.com/voices/custom.wav

ingress:
  enabled: false
  host: ""
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations: []

affinity: {}
