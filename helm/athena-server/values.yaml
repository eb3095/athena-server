replicaCount: 1

image:
  repository: ebennerv/athena-server
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003

auth:
  token: ""

openai:
  apiKey: ""
  model: "gpt-4o"
  temperature: "0.7"
  maxTokens: "4096"

athenaTts:
  url: "http://athena-tts:5002"
  token: ""

defaultVoice: ""

prompts:
  formatting: "Format your response using markdown when appropriate. Use headers, bullet points, code blocks, and emphasis to make the response clear and readable."
  personality: "You are a helpful AI assistant."
  ttsConversion: "Rewrite this as natural speech. Keep the same meaning and information but make it sound like someone talking. No markdown, no bullet points, no formatting - just flowing sentences. Never say words like 'bullet', 'asterisk', 'heading', or 'code block'. Spell out abbreviations and numbers naturally. Output only the rewritten text."

security:
  rateLimitRequests: 300
  rateLimitWindowSeconds: 60
  authFailBanThreshold: 3
  authFailBanDurationSeconds: 604800

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ingress:
  enabled: false
  host: ""
  timeout: "600s"
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations: []

affinity: {}
