replicaCount: 1

image:
  repository: ebennerv/athena-server
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003

auth:
  token: ""

openai:
  apiKey: ""
  model: "gpt-4o"
  temperature: "0.7"
  maxTokens: "4096"

athenaTts:
  url: "http://athena-tts:5002"
  token: ""

defaultVoice: ""

prompts:
  formatting: "Format your response using markdown when appropriate. Use headers, bullet points, code blocks, and emphasis to make the response clear and readable."
  personality: "You are a helpful AI assistant."
  ttsConversion: "Convert this text to spoken form while keeping it as close to the original wording as possible. Only make minimal changes: remove markdown symbols, convert lists to sentences, spell out abbreviations. Do not rephrase, summarize, or add anything. Never say words like 'bullet', 'asterisk', or 'code block'. Output only the converted text."

security:
  rateLimitRequests: 300
  rateLimitWindowSeconds: 60
  authFailBanThreshold: 3
  authFailBanDurationSeconds: 604800

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

ingress:
  enabled: false
  host: ""
  timeout: "600s"
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations: []

affinity: {}
