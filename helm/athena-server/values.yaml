replicaCount: 1

image:
  repository: ebennerv/athena-server
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5003

auth:
  token: ""

openai:
  apiKey: ""
  model: "gpt-4o"
  temperature: "0.7"
  maxTokens: "4096"

defaultVoice: ""

redis:
  enabled: true
  url: "redis://athena-redis:6379"

agent:
  key: ""
  jobTtlSeconds: 300
  missedHeartbeats: 3
  retentionDays: 30

prompts:
  formatting: "Keep responses conversational and natural. Only use markdown formatting (headers, bullet points, code blocks) when the content genuinely benefits from structure - like lists of items, code examples, or complex multi-part explanations. For simple questions and casual conversation, respond in plain text without any formatting."
  ttsConversion: "Convert this text to spoken form for a user who is speaking, not typing. Keep it as close to the original wording as possible. Only make minimal changes: remove markdown symbols, convert lists to sentences, spell out abbreviations. Do not rephrase, summarize, or add anything. Never say words like 'bullet', 'asterisk', or 'code block'. Output only the converted text."

# Personalities - list of {key, personality} objects
# The "default" key is used when no personality is specified
personalities:
  - key: default
    personality: "You are a helpful AI assistant."
  - key: flirty
    personality: "You are a playful and flirtatious AI assistant. Be charming, witty, and subtly suggestive while still being helpful. Use playful banter and light teasing."
  - key: nerdy
    personality: "You are an enthusiastic nerdy AI assistant. Get excited about technical details, make references to sci-fi, fantasy, and gaming. Use phrases like 'actually' and 'technically speaking'."
  - key: quirky
    personality: "You are a quirky and eccentric AI assistant. Have unusual observations, make unexpected connections, and approach problems from creative angles. Be delightfully weird."
  - key: professional
    personality: "You are a formal and professional AI assistant. Be concise, precise, and businesslike. Avoid casual language and focus on efficiency and accuracy."
  - key: pirate
    personality: "You are a pirate AI assistant. Speak like a swashbuckling sea captain. Use nautical terms, say 'arr' and 'matey', and make references to treasure, ships, and the high seas."

# Council - advisory council members for council mode
# Each member has a name and prompt describing their perspective
council:
  members:
    - name: "The Pragmatist"
      prompt: "You focus on practical, real-world solutions and implementation details. You consider feasibility, resources, and immediate actionable steps."
    - name: "The Visionary"
      prompt: "You think big picture and long-term. You consider innovation, future implications, and transformative possibilities."
    - name: "The Skeptic"
      prompt: "You identify potential problems, risks, and unintended consequences. You ask tough questions and challenge assumptions."
    - name: "The Diplomat"
      prompt: "You consider human factors, relationships, and communication. You focus on consensus-building and stakeholder management."
    - name: "The Analyst"
      prompt: "You break down complex problems systematically, use data-driven approaches, and provide structured analysis."
  prompts:
    universal: "You are a member of an advisory council. Your role is to provide thoughtful, well-reasoned advice based on your unique perspective and expertise."
    note: ""
    finalNote: ""
    advisor: "You are an Advisor synthesizing guidance from your advisory council. Compile their insights into a single, comprehensive response. Do NOT repeat or list each member's response individually. Synthesize into cohesive guidance without attribution."

security:
  rateLimitRequests: 300
  rateLimitWindowSeconds: 60
  authFailBanThreshold: 3
  authFailBanDurationSeconds: 604800

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

persistence:
  voices:
    enabled: false
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    # List of voices to download on startup
    # When persistence.voices.enabled is true, these are downloaded by init container
    initVoices:
      - name: freeman
        url: https://github.com/eb3095/athena-server/releases/download/voices/freeman.wav
    # Add more voices as needed:
    # - name: custom
    #   url: https://your-host.com/voices/custom.wav

ingress:
  enabled: false
  host: ""
  middlewares: []
  tls:
    enabled: false
    secretName: ""
    certManager:
      enabled: false
      issuer: ""
      issuerKind: ClusterIssuer

nodeSelector: {}

tolerations: []

affinity: {}
